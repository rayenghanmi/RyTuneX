name: Mark stale issues and pull requests

on:
  schedule:
  - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@v9
      with:
        stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions.'
        stale-pr-message: 'This pull request has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Please comment or ping if you need help getting this across the line!'
        days-before-issue-stale: 60
        days-before-pr-stale: 45
        days-before-issue-close: 7
        days-before-pr-close: 14
        stale-issue-label: 'wontfix/stale'
        stale-pr-label: 'stale'
