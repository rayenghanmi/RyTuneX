name: Bug Report
description: Report a bug or issue in RyTuneX to help us improve the experience.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!
        RyTuneX applies system-level optimizations, so providing exact OS version and hardware details helps greatly.
  - type: checkboxes
    id: checklist
    attributes:
      label: Important Checklist
      options:
        - label: I am using the latest version of RyTuneX.
          required: true
        - label: I am not using Insider, Beta, Dev, or Canary channels of Windows.
          required: true
        - label: I have searched the issue tracker and discussions for similar bugs.
          required: true
  - type: input
    id: os_version
    attributes:
      label: Windows OS Version & Build
      description: e.g., Windows 11 Pro 23H2 (OS Build 22631.3374)
      placeholder: Win 11 23H2 ...
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation Method
      description: How did you install RyTuneX?
      options:
        - Microsoft Store
        - WinGet
        - GitHub Release
        - Compiled from source
    validations:
      required: true
  - type: textarea
    id: bug_description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I apply the Network Optimization tweak, the app crashes...
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: What exact steps did you take before encountering the issue?
      placeholder: |
        1. Open RyTuneX.
        2. Go to '...'.
        3. Click on '....'.
        4. See the error ...
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g. error logs, screenshots, applied tweaks).
    validations:
      required: false
